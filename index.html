<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>8D Player - Premium Export</title>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags/dist/jsmediatags.min.js"></script>

<style>
/* SAME CSS (UNCHANGED) */
body {
  margin: 0;
  height: 100vh;
  background: #0c0c0f;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: white;
}

.player {
  background: #1c1c1e;
  padding: 25px;
  border-radius: 25px;
  width: 320px;
  display: flex;
  gap: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.left {
  flex: 1;
  text-align: center;
  min-width: 0;
}

.right {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  width: 120px;
}

#albumArt {
  width: 120px;
  height: 120px;
  border-radius: 20px;
  object-fit: cover;
  margin-bottom: 15px;
  display: none;
  transition: all 0.3s ease;
}

#volume {
  writing-mode: bt-lr;
  -webkit-appearance: slider-vertical;
  height: 130px;
  margin-bottom: 15px;
}

button {
  margin-top: 15px;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(145deg, #2c2c2e, #1a1a1c);
  color: white;
  font-size: 22px;
  cursor: pointer;
  transition: transform 0.2s;
}

button:active { transform: scale(0.95); }

.file-label {
  display: inline-block;
  padding: 10px 15px;
  margin-top: 10px;
  background: linear-gradient(145deg, #2c2c2e, #1a1a1c);
  border-radius: 12px;
  cursor: pointer;
  font-size: 13px;
}

#file { display: none; }

#title {
  font-size: 14px;
  margin-top: 5px;
  color: #aaa;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

input[type="range"] {
  width: 100%;
  margin-top: 10px;
}

#playBtn {
  display: block;
  margin: 15px auto;
}

#downloadBtn {
  width: 100%;
  height: 40px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #00b09b, #96c93d);
  color: white;
  border: none;
  cursor: pointer;
  margin-top: auto;
  box-shadow: 0 4px 15px rgba(0, 176, 155, 0.3);
}

#downloadBtn:hover { filter: brightness(1.1); }

#downloadBtn:disabled {
  background: #444;
  box-shadow: none;
  cursor: wait;
}
</style>
</head>

<body>

<div class="player">

  <div class="left">
    <h2>🎧 8D</h2>
    <p id="title">No song selected</p>
    <label for="file" class="file-label">📁 Choose Song</label>
    <input type="file" id="file" accept="audio/*"><br>
    <input type="range" id="seek" value="0">
    <button id="playBtn">▶</button>
    <button id="dolbyBtn" style="width:auto;height:auto;border-radius:12px;padding:8px 12px;font-size:14px;">
      Careless Mode OFF
    </button>
    <br><br>
    <label style="font-size: 12px; color: #888;">8D Speed Control</label>
    <input type="range" id="speed" min="0.005" max="0.1" step="0.005" value="0.02">
  </div>

  <div class="right">
    <div style="height:120px; width:120px; margin-bottom:15px;">
        <img src="photo.png" alt="Art" id="albumArt">
    </div>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
    <button id="downloadBtn">Download</button>
  </div>

</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");
let ctx = new (window.AudioContext || window.webkitAudioContext)();
let source = ctx.createMediaElementSource(audio);
let panner = ctx.createStereoPanner();
let gain = ctx.createGain();

let convolver = ctx.createConvolver();
let wetGain = ctx.createGain();
let dryGain = ctx.createGain();

function createImpulse() {
  let length = ctx.sampleRate * 2;
  let impulse = ctx.createBuffer(2, length, ctx.sampleRate);
  for (let c = 0; c < 2; c++) {
    let data = impulse.getChannelData(c);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / length);
    }
  }
  return impulse;
}
convolver.buffer = createImpulse();

source.connect(panner);
panner.connect(dryGain);
dryGain.connect(gain);
panner.connect(convolver);
convolver.connect(wetGain);
wetGain.connect(gain);
gain.connect(ctx.destination);

dryGain.gain.value = 1;
wetGain.gain.value = 0;

let angle = 0;
let speed = 0.02;

document.getElementById("speed").oninput = function() {
  speed = parseFloat(this.value);
};

let dolbyMode = false;
document.getElementById("dolbyBtn").onclick = function() {
  dolbyMode = !dolbyMode;
  this.innerText = dolbyMode ? "Careless Mode ON" : "Careless Mode OFF";
  wetGain.gain.value = dolbyMode ? 0.6 : 0;
  dryGain.gain.value = dolbyMode ? 0.7 : 1;
};

let currentFile = null;
let albumArt = document.getElementById("albumArt");

file.onchange = function() {
  let f = this.files[0];
  if (f) {
    currentFile = f;
    audio.src = URL.createObjectURL(f);
    title.innerText = f.name;

    // album art extract
    jsmediatags.read(f, {
      onSuccess: function(tag) {
        let pic = tag.tags.picture;
        if (pic) {
          let base64 = "";
          for (let i = 0; i < pic.data.length; i++) {
            base64 += String.fromCharCode(pic.data[i]);
          }
          albumArt.src = "data:" + pic.format + ";base64," + btoa(base64);
        } else {
          albumArt.src = "photo.png";
        }
      },
      onError: function() {
        albumArt.src = "photo.png";
      }
    });

    // ✅ SHOW immediately after select
    albumArt.style.display = "block";
  }
};

let isPlaying = false;
let anim;

playBtn.onclick = async function() {
  if (ctx.state === "suspended") await ctx.resume();
  if (!isPlaying) {
    audio.play();
    this.innerText = "❚❚";
    move();
  } else {
    audio.pause();
    this.innerText = "▶";
    cancelAnimationFrame(anim);
  }
  isPlaying = !isPlaying;
};

audio.ontimeupdate = () => {
  seek.value = audio.currentTime;
  seek.max = audio.duration;
};
seek.oninput = () => audio.currentTime = seek.value;
volume.oninput = e => gain.gain.value = e.target.value;

function move() {
  function loop() {
    angle += speed;
    let pan = Math.sin(angle);
    panner.pan.setValueAtTime(pan, ctx.currentTime);
    anim = requestAnimationFrame(loop);
  }
  loop();
}

/* DOWNLOAD SAME (UNCHANGED) */
document.getElementById("downloadBtn").onclick = async function() {
  if (!currentFile) return alert("Song choose karein!");
  
  const btn = this;
  const originalText = btn.innerText;
  btn.innerText = "WAIT...";
  btn.disabled = true;

  try {
    const arrayBuffer = await currentFile.arrayBuffer();
    const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
    const offlineCtx = new OfflineAudioContext(2, audioBuffer.length, audioBuffer.sampleRate);

    const offlineSource = offlineCtx.createBufferSource();
    offlineSource.buffer = audioBuffer;
    const offlinePanner = offlineCtx.createStereoPanner();
    const offlineGain = offlineCtx.createGain();
    offlineGain.gain.value = gain.gain.value;

    if (dolbyMode) {
      const offlineConvolver = offlineCtx.createConvolver();
      offlineConvolver.buffer = convolver.buffer;
      const offWet = offlineCtx.createGain();
      const offDry = offlineCtx.createGain();
      offlineSource.connect(offlinePanner);
      offlinePanner.connect(offDry);
      offDry.connect(offlineGain);
      offlinePanner.connect(offlineConvolver);
      offlineConvolver.connect(offWet);
      offWet.connect(offlineGain);
      offDry.gain.value = 0.7;
      offWet.gain.value = 0.6;
    } else {
      offlineSource.connect(offlinePanner);
      offlinePanner.connect(offlineGain);
    }
    offlineGain.connect(offlineCtx.destination);

    let offAngle = 0;
    const step = 0.05;
    for (let t = 0; t < audioBuffer.duration; t += step) {
      offAngle += speed * (step / 0.016);
      offlinePanner.pan.setValueAtTime(Math.sin(offAngle), t);
    }

    offlineSource.start();
    const renderedBuffer = await offlineCtx.startRendering();
    const wavBlob = bufferToWav(renderedBuffer);
    const url = URL.createObjectURL(wavBlob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "8D_" + currentFile.name.split('.')[0] + ".wav";
    a.click();
  } catch (err) {
    alert("Error!");
  }
  btn.innerText = originalText;
  btn.disabled = false;
};

function bufferToWav(abuffer) {
  let numOfChan = abuffer.numberOfChannels, length = abuffer.length * numOfChan * 2 + 44,
    buffer = new ArrayBuffer(length), view = new DataView(buffer),
    channels = [], i, sample, offset = 0, pos = 0;
  function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
  function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
  setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
  setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
  setUint32(abuffer.sampleRate); setUint32(abuffer.sampleRate * 2 * numOfChan);
  setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);
  for(i=0; i<abuffer.numberOfChannels; i++) channels.push(abuffer.getChannelData(i));
  while(pos < length) {
    for(i=0; i<numOfChan; i++) {
      sample = Math.max(-1, Math.min(1, channels[i][offset]));
      view.setInt16(pos, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
      pos += 2;
    }
    offset++;
  }
  return new Blob([buffer], {type: "audio/wav"});
}
</script>

</body>
</html>
