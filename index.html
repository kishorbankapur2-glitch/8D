<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>8D Player</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0c0c0f;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, sans-serif;
  color: white;
}

.player {
  background: #1c1c1e;
  padding: 25px;
  border-radius: 25px;
  width: 320px;
  display: flex;
  gap: 20px;
}

.left {
  flex: 1;
  text-align: center;
  min-width: 0;
}

.right {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative; /* for proper image placement */
}

#albumArt {
  width: 120px;
  height: 120px;
  border-radius: 20px;
  object-fit: cover;
  margin-bottom: 10px; /* space above slider */
  display: none; /* hidden by default */
}

#volume {
  writing-mode: bt-lr;
  -webkit-appearance: slider-vertical;
  height: 150px;
}

button {
  margin-top: 15px;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(145deg, #2c2c2e, #1a1a1c);
  color: white;
  font-size: 22px;
  cursor: pointer;
}

.file-label {
  display: inline-block;
  padding: 10px 15px;
  margin-top: 10px;
  background: linear-gradient(145deg, #2c2c2e, #1a1a1c);
  border-radius: 12px;
  cursor: pointer;
}

#file { display: none; }

#title {
  font-size: 14px;
  margin-top: 5px;
  color: #aaa;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

input[type="range"] {
  width: 100%;
  margin-top: 10px;
}

#playBtn {
  display: block;
  margin: 15px auto;
}
</style>
</head>

<body>

<div class="player">

  <div class="left">
    <h2>🎧 8D</h2>

    <p id="title">No song selected</p>

    <label for="file" class="file-label">📁 Choose Song</label>
    <input type="file" id="file"><br>

    <input type="range" id="seek" value="0">

    <button id="playBtn">▶</button>

    <button id="dolbyBtn" style="width:auto;height:auto;border-radius:12px;padding:8px 12px;font-size:14px;">
      Careless Mode OFF
    </button>

    <br>
    <label>8D Speed</label>
    <input type="range" id="speed" min="0.005" max="0.1" step="0.005" value="0.02">
  </div>

  <div class="right">
    <!-- Album art above slider -->
    <img src="photo.png" alt="Album Art" id="albumArt">
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>

</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");
let ctx = new (window.AudioContext || window.webkitAudioContext)();

let source = ctx.createMediaElementSource(audio);
let panner = ctx.createStereoPanner();
let gain = ctx.createGain();

// Careless (Dolby)
let convolver = ctx.createConvolver();
let wetGain = ctx.createGain();
let dryGain = ctx.createGain();

function createImpulse() {
  let length = ctx.sampleRate * 2;
  let impulse = ctx.createBuffer(2, length, ctx.sampleRate);
  for (let c = 0; c < 2; c++) {
    let data = impulse.getChannelData(c);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / length);
    }
  }
  return impulse;
}
convolver.buffer = createImpulse();

source.connect(panner);
panner.connect(dryGain);
dryGain.connect(gain);
panner.connect(convolver);
convolver.connect(wetGain);
wetGain.connect(gain);
gain.connect(ctx.destination);

dryGain.gain.value = 1;
wetGain.gain.value = 0;

let angle = 0;
let speed = 0.02;

document.getElementById("speed").oninput = function() {
  speed = parseFloat(this.value);
};

let dolbyMode = false;
document.getElementById("dolbyBtn").onclick = function() {
  dolbyMode = !dolbyMode;
  this.innerText = dolbyMode ? "Careless Mode ON" : "Careless Mode OFF";
  wetGain.gain.value = dolbyMode ? 0.6 : 0;
  dryGain.gain.value = dolbyMode ? 0.7 : 1;
};

file.onchange = function() {
  let f = this.files[0];
  if (f) {
    audio.src = URL.createObjectURL(f);
    title.innerText = f.name;
  }
};

let isPlaying = false;
let albumArt = document.getElementById("albumArt");
playBtn.onclick = async function() {
  if (ctx.state === "suspended") await ctx.resume();

  if (!isPlaying) {
    audio.play();
    this.innerText = "❚❚";
    albumArt.style.display = "block"; // show image above slider
    move();
  } else {
    audio.pause();
    this.innerText = "▶";
    albumArt.style.display = "none"; // hide image
    cancelAnimationFrame(anim);
  }
  isPlaying = !isPlaying;
};

audio.ontimeupdate = () => {
  seek.value = audio.currentTime;
  seek.max = audio.duration;
};
seek.oninput = () => audio.currentTime = seek.value;

volume.oninput = e => gain.gain.value = e.target.value;

let anim;
function move() {
  function loop() {
    angle += speed;
    let pan = Math.sin(angle);
    panner.pan.setValueAtTime(pan, ctx.currentTime);
    anim = requestAnimationFrame(loop);
  }
  loop();
}
</script>

</body>
</html>
